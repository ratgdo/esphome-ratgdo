---
substitutions:
  id_prefix: ratgdo32disco
  friendly_name: "ratgdo32disco"
  uart_tx_pin: GPIO17
  uart_rx_pin: GPIO21
  input_obst_pin: GPIO4
  dry_contact_open_pin: GPIO13
  dry_contact_close_pin: GPIO14
  discrete_open_pin: GPIO26
  discrete_close_pin: GPIO25

web_server:
  include_internal: true
  local: true

esphome:
  name: ${id_prefix}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  min_version: 2026.4.0
  project:
    name: ratgdo.v32disco_drycontact_enc
    version: "32disco"

esp32:
  board: esp32dev
  framework:
    type: arduino

dashboard_import:
  package_import_url: github://ratgdo/esphome-ratgdo/v32disco_drycontact_enc.yaml@main

packages:
  # remote_package:
  #   url: https://github.com/ratgdo/esphome-ratgdo
  #   ref: main
  #   files: [base_drycontact_enc.yaml]
  #   refresh: 1s
  remote_package: !include
    file: base_drycontact_enc.yaml

# Sync time with Home Assistant.
time:
  - platform: homeassistant
    id: homeassistant_time

api:
  id: api_server

improv_serial:

esp32_improv:
  authorizer: none

wifi:
  ap:

logger:
  logs:
    sensor: NONE
