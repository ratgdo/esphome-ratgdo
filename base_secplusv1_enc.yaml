---
esphome:
  min_version: 2026.4.0

external_components:
  - source:
      type: git
      url: https://github.com/ratgdo/esphome-ratgdo
      ref: main
    refresh: 1s
  # - source:
  #     type: local
  #     path: components

safe_mode:

preferences:
  flash_write_interval: 1min

text_sensor:
  - platform: version
    id: ${id_prefix}_firmware_version
    name: "Firmware Version"

ratgdo:
  id: ${id_prefix}
  encoder_pin_a:
    number: ${dry_contact_open_pin}
    mode:
      input: true
      pullup: true
  encoder_pin_b:
    number: ${dry_contact_close_pin}
    mode:
      input: true
      pullup: true
  encoder_sensor: ${id_prefix}_encoder
  input_gdo_pin: ${uart_rx_pin}
  output_gdo_pin: ${uart_tx_pin}
  input_obst_pin: ${input_obst_pin}
  protocol: secplusv1
  on_sync_failed:
    then:
      - homeassistant.service:
          service: persistent_notification.create
          data:
            title: "${friendly_name} sync failed"
            message: "Failed to communicate with garage opener on startup."
            notification_id: "esphome_ratgdo_${id_prefix}_sync_failed"

ota:
  - platform: esphome
    id: ${id_prefix}_ratgdo_ota
  - platform: web_server
    id: ${id_prefix}_ratgdo_ota_ws

lock:
  - platform: ratgdo
    id: ${id_prefix}_lock_remotes
    name: "Lock remotes"

switch:
  - platform: gpio
    id: "${id_prefix}_status_door"
    internal: true
    pin:
      number: ${status_door_pin}  # D0 output door status, HIGH for open, LOW for closed
      mode:
        output: true
    name: "Status door"
    entity_category: diagnostic
  - platform: gpio
    id: "${id_prefix}_status_obstruction"
    internal: true
    pin:
      number: ${status_obstruction_pin}  # D8 output for obstruction status, HIGH for obstructed, LOW for clear
      mode:
        output: true
    name: "Status obstruction"
    entity_category: diagnostic

binary_sensor:
  - platform: ratgdo
    type: manually_operated # latches until the door opener is cycled
    id: ${id_prefix}_manually_operated
    name: "Manually Operated"
    device_class: problem
    entity_category: diagnostic
  - platform: ratgdo
    type: motion
    id: ${id_prefix}_motion
    name: "Motion"
    device_class: motion
  - platform: ratgdo
    type: obstruction
    id: ${id_prefix}_obstruction
    name: "Obstruction"
    device_class: problem
    on_press:
      - switch.turn_on: ${id_prefix}_status_obstruction
    on_release:
      - switch.turn_off: ${id_prefix}_status_obstruction
  - platform: ratgdo
    type: button
    id: ${id_prefix}_button
    name: "Button"
    entity_category: diagnostic




sensor:
  - platform: ratgdo
    id: ${id_prefix}_encoder
    type: encoder
    name: "Encoder"
    unit_of_measurement: "steps"
    accuracy_decimals: 0
    entity_category: diagnostic

number:
  - platform: ratgdo
    id: ${id_prefix}_rolling_code_counter
    type: rolling_code_counter
    entity_category: config
    name: "Rolling code counter"
    mode: box
    unit_of_measurement: "codes"

  - platform: ratgdo
    id: ${id_prefix}_opening_duration
    type: opening_duration
    entity_category: config
    name: "Opening duration"
    unit_of_measurement: "s"

  - platform: ratgdo
    id: ${id_prefix}_closing_duration
    type: closing_duration
    entity_category: config
    name: "Closing duration"
    unit_of_measurement: "s"

  - platform: ratgdo
    id: ${id_prefix}_client_id
    type: client_id
    entity_category: config
    name: "Client ID"
    mode: box

cover:
  - platform: ratgdo
    id: ${id_prefix}_garage_door
    device_class: garage
    name: "Door"
    on_closed:
      - switch.turn_off: ${id_prefix}_status_door
    on_opened:
      - switch.turn_on: ${id_prefix}_status_door

light:
  - platform: ratgdo
    id: ${id_prefix}_light
    name: "Light"

button:
  - platform: template
    id: ${id_prefix}_reset_calibration
    name: "Encoder Calibration Reset"
    entity_category: config
    on_press:
      then:
        lambda: !lambda |-
          id($id_prefix).reset_encoder_calibration();
  - platform: restart
    id: ${id_prefix}_restart
    name: "Restart"
  - platform: safe_mode
    id: ${id_prefix}_safe_mode
    name: "Safe mode boot"
    entity_category: diagnostic

  - platform: template
    id: ${id_prefix}_query_status
    entity_category: diagnostic
    name: "Query status"
    on_press:
      then:
        lambda: !lambda |-
          id($id_prefix).query_status();

  - platform: template
    id: ${id_prefix}_sync
    name: "Sync"
    entity_category: diagnostic
    on_press:
      then:
        lambda: !lambda |-
          id($id_prefix).sync();

  - platform: template
    id: ${id_prefix}_toggle_door
    name: "Toggle door"
    on_press:
      then:
        lambda: !lambda |-
          id($id_prefix).door_toggle();
